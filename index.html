<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웹 카운터</title>
    <meta name="description" content="터치할 때마다 색상이 변하는 웹 카운터 앱">
    <meta name="theme-color" content="#f8e1ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="카운터">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png">
    <link rel="shortcut icon" href="./icons/icon-192x192.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: hsl(306, 60%, 75%);
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: hsl(306, 60%, 75%);
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
            transition: background-color 0.5s ease;
        }

        @keyframes flash {
            0% { background-color: var(--current-color); }
            50% { background-color: white; }
            100% { background-color: var(--current-color); }
        }

        @keyframes fade {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .flash { animation: flash 0.3s ease; }
        html.flash { animation: flash 0.3s ease; }
        .fade { animation: fade 0.5s ease; }

        #counter {
            font-size: 8rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0; padding: 0;
            line-height: 1;
            z-index: 1;
            width: 100%;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-weight: 600;
        }

        #resetButton {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s ease;
            z-index: 1;
        }
        #resetButton:hover { opacity: 1; }
        #resetButton:active { opacity: 0.6; }

        #version {
            position: fixed;
            bottom: 0.4rem;
            right: 0.6rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.45);
            z-index: 1;
            pointer-events: none;
        }

        #installPrompt {
            position: fixed;
            top: 0; left: 0; right: 0;
            background-color: rgba(0, 0, 0, 0.8) !important;
            color: white;
            padding: 1rem;
            text-align: center;
            z-index: 1000;
            display: none;
            font-size: 0.9rem;
            touch-action: none;
            pointer-events: auto;
        }
        #installPrompt * { pointer-events: auto; }

        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 999;
            display: none;
            pointer-events: auto;
        }

        #installPrompt button {
            background-color: white;
            color: black;
            border: none;
            padding: 0.5rem 1rem;
            margin: 0.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .ios-guide {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
        }
        .ios-guide span { line-height: 1.5; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="installPrompt">
        <span>홈 화면에 추가하여 더 편리하게 사용하세요!</span>
        <button id="installButton">설치하기</button>
    </div>
    <div id="counter">0</div>
    <button id="resetButton">Reset</button>
    <div id="version">v1.1.0</div>

    <script>
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');
        const overlay = document.getElementById('overlay');

        function showInstallPrompt() {
            overlay.style.display = 'block';
            installPrompt.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function hideInstallPrompt() {
            overlay.style.display = 'none';
            installPrompt.style.display = 'none';
            document.body.style.overflow = '';
        }

        overlay.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            hideInstallPrompt();
        });

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        if (isIOS && !isStandalone) {
            showInstallPrompt();
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallPrompt();
        });

        installButton.addEventListener('click', async (event) => {
            event.preventDefault();
            event.stopPropagation();

            if (isIOS) {
                const guideDiv = document.createElement('div');
                guideDiv.className = 'ios-guide';
                const guideSpan = document.createElement('span');
                guideSpan.innerHTML = '1. 하단 공유 버튼을 탭하세요<br>2. \'홈 화면에 추가\'를 탭하세요<br>3. \'추가\'를 탭하세요';
                guideDiv.appendChild(guideSpan);
                installPrompt.innerHTML = '';
                installPrompt.appendChild(guideDiv);
            } else if (deferredPrompt) {
                try {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        hideInstallPrompt();
                    }
                    deferredPrompt = null;
                } catch (error) {
                    console.error('설치 프롬프트 표시 중 오류 발생:', error);
                }
            }
        });

        const CONFIG = {
            DOUBLE_TAP_DELAY: 300,
            FLASH_DURATION: 300,
            RESET_FADE_DELAY: 250,
            RESET_UNFADE_DELAY: 500,
            BOTTOM_EXCLUSION_RATIO: 0.9,
            COLOR_STAGE_1_MAX: 100,
            COLOR_STAGE_2_MAX: 200,
        };

        let count = 0;
        const counterElement = document.getElementById('counter');
        const resetButton = document.getElementById('resetButton');
        const body = document.body;
        let isAppActive = true;

        document.addEventListener('visibilitychange', () => {
            isAppActive = document.visibilityState === 'visible';
        });

        let lastTap = 0;

        function handleTap(event) {
            if (installPrompt.style.display === 'block' || overlay.style.display === 'block') return;
            if (!isAppActive) return;
            if (event.touches && event.touches.length > 1) return;

            const touch = event.touches ? event.touches[0] : event;
            const startY = touch.clientY;
            if (startY > window.innerHeight * CONFIG.BOTTOM_EXCLUSION_RATIO) return;

            event.preventDefault();
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            lastTap = currentTime;

            if (tapLength < CONFIG.DOUBLE_TAP_DELAY && tapLength > 0) {
                return;
            }

            count++;
            counterElement.textContent = count;
            updateColor();
            addFlashEffect();
        }

        function addFlashEffect() {
            body.classList.add('flash');
            document.documentElement.classList.add('flash');
            setTimeout(() => {
                body.classList.remove('flash');
                document.documentElement.classList.remove('flash');
            }, CONFIG.FLASH_DURATION);
        }

        document.addEventListener('touchstart', handleTap, { passive: false });
        document.addEventListener('click', handleTap);
        document.addEventListener('gesturestart', (e) => e.preventDefault());

        function updateColor() {
            const startHue = 306;
            const endHue = 0;
            let hue, saturation, lightness;

            if (count <= CONFIG.COLOR_STAGE_1_MAX) {
                hue = startHue - (count / 100) * (startHue - endHue);
                saturation = 60;
                lightness = 75;
            } else if (count <= CONFIG.COLOR_STAGE_2_MAX) {
                hue = endHue;
                saturation = 60 + ((count - CONFIG.COLOR_STAGE_1_MAX) / 100) * 40;
                lightness = 75 - ((count - CONFIG.COLOR_STAGE_1_MAX) / 100) * 25;
            } else {
                hue = endHue;
                saturation = 100;
                lightness = 50;
            }

            const currentColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            body.style.backgroundColor = currentColor;
            body.style.setProperty('--current-color', currentColor);
            document.documentElement.style.backgroundColor = currentColor;

            const themeColorMeta = document.querySelector('meta[name="theme-color"]');
            if (themeColorMeta) themeColorMeta.setAttribute('content', currentColor);
        }

        function resetCounter(event) {
            event.preventDefault();
            event.stopPropagation();
            body.classList.add('fade');
            counterElement.classList.add('fade');
            setTimeout(() => {
                count = 0;
                counterElement.textContent = count;
                updateColor();
                setTimeout(() => {
                    body.classList.remove('fade');
                    counterElement.classList.remove('fade');
                }, CONFIG.RESET_UNFADE_DELAY);
            }, CONFIG.RESET_FADE_DELAY);
        }

        resetButton.addEventListener('touchstart', resetCounter, { passive: false });
        resetButton.addEventListener('click', resetCounter);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 등록 성공: ', registration.scope);
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    window.location.reload();
                                }
                            });
                        });
                    })
                    .catch(error => console.log('ServiceWorker 등록 실패: ', error));
            });
        }
    </script>
</body>
</html>
